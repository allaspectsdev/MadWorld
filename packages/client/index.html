<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MadWorld</title>
  <link rel="stylesheet" href="/src/ui/styles/mobile.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #game { width: 100%; height: 100%; position: relative; }
    #game canvas { display: block; }
    #ui-root {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
    }
    #ui-root > * { pointer-events: auto; }

    /* Login screen */
    #login-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      z-index: 100;
    }
    #login-screen h1 {
      font-size: 48px;
      color: #e94560;
      margin-bottom: 10px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.7), 0 4px 8px rgba(0,0,0,0.5);
    }
    #login-screen .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }
    #login-screen form {
      display: flex; flex-direction: column; gap: 12px; width: 300px;
    }
    #login-screen input {
      padding: 10px 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }
    #login-screen input::placeholder { color: rgba(255,255,255,0.4); }
    #login-screen button {
      padding: 12px;
      background: #e94560;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen button:hover { background: #c73e54; }
    #login-screen .toggle { color: #aaa; text-align: center; cursor: pointer; font-size: 13px; }
    #login-screen .toggle:hover { color: #fff; }
    #login-screen .error { color: #ff6b6b; text-align: center; font-size: 13px; min-height: 18px; }

    /* HUD */
    #hud {
      position: absolute; top: 10px; left: 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .bar-container {
      width: 220px; height: 24px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .bar-container.damage-flash {
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 8px rgba(255,0,0,0.6);
      transition: box-shadow 0.3s;
    }
    .bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }
    .bar-fill.hp { background: linear-gradient(to right, #e94560, #ff6b6b); }
    .bar-label {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    /* Party HUD */
    #party-hud {
      position: absolute; top: 50px; left: 10px;
      display: none; flex-direction: column; gap: 6px;
      width: 180px;
    }
    .party-member {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 4px 8px;
    }
    .party-member-header { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .party-member-name { font-size: 11px; font-weight: bold; }
    .party-leader-icon { color: #ffd700; font-size: 11px; }
    .party-hp-container {
      width: 100%; height: 14px;
      background: rgba(0,0,0,0.5);
      border-radius: 2px;
      overflow: hidden; position: relative;
    }
    .party-hp-bar { height: 100%; transition: width 0.3s; }
    .party-hp-text {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
    }
    .party-member-zone { font-size: 9px; color: #888; }

    /* Party invite modal */
    #party-invite-modal {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      display: none; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.85); border: 1px solid #e94560;
      border-radius: 8px; padding: 16px 24px; z-index: 60;
    }
    #party-invite-modal p { font-size: 14px; text-align: center; }
    #party-invite-modal .invite-buttons { display: flex; gap: 10px; }
    #party-invite-modal button {
      padding: 8px 16px; border: none; border-radius: 4px;
      font-family: inherit; font-size: 13px; cursor: pointer;
    }
    #invite-accept { background: #2ecc71; color: #fff; }
    #invite-decline { background: #e74c3c; color: #fff; }

    /* Dungeon complete banner */
    #dungeon-complete-banner {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
      display: none; flex-direction: column; align-items: center;
      background: rgba(0,0,0,0.8); border: 2px solid #ffd700;
      border-radius: 10px; padding: 20px 40px; z-index: 55;
    }
    #dungeon-complete-banner h2 { color: #ffd700; font-size: 28px; }
    #dungeon-complete-banner p { color: #ccc; font-size: 14px; margin-top: 8px; }

    /* Dungeon wipe overlay */
    #dungeon-wipe-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(80,0,0,0.7); display: none;
      align-items: center; justify-content: center; flex-direction: column; z-index: 50;
    }
    #dungeon-wipe-overlay.active { display: flex; }
    #dungeon-wipe-overlay h2 { color: #ff4444; font-size: 36px; }
    #dungeon-wipe-overlay p { color: #ccc; font-size: 16px; margin-top: 8px; }

    /* Zone name */
    #zone-name {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      font-size: 18px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.5s;
    }
    #zone-name.visible { opacity: 1; }

    /* Skill XP popup */
    .xp-popup {
      position: absolute;
      right: 10px;
      font-size: 14px;
      color: #7bed9f;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      animation: xpFade 2s ease-out forwards;
    }
    @keyframes xpFade {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-30px); }
    }

    /* Death overlay */
    #death-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(80,0,0,0.85) 100%);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      z-index: 50;
    }
    #death-overlay.active { display: flex; }
    #death-overlay h2 { color: #e94560; font-size: 36px; margin-bottom: 10px; }
    #death-overlay p { color: #aaa; font-size: 16px; }
  </style>
</head>
<body>
  <div id="game">
    <div id="ui-root">
      <!-- Login Screen -->
      <div id="login-screen">
        <h1>MadWorld</h1>
        <div class="subtitle">Browser MMORPG</div>
        <form id="login-form">
          <input type="email" id="auth-email" placeholder="Email" required />
          <input type="password" id="auth-password" placeholder="Password" required />
          <input type="text" id="auth-name" placeholder="Character Name" style="display:none" />
          <button type="submit" id="auth-submit">Login</button>
          <div class="error" id="auth-error"></div>
          <div class="toggle" id="auth-toggle">Don't have an account? Register</div>
        </form>
      </div>

      <!-- HUD -->
      <div id="hud" style="display:none">
        <div class="bar-container">
          <div class="bar-fill hp" id="hp-bar" style="width:100%"></div>
          <div class="bar-label"><span id="hp-text">100 / 100</span></div>
        </div>
        <div class="bar-container" style="height:16px; margin-top:4px;">
          <div class="bar-fill xp" id="xp-bar" style="width:0%; background: linear-gradient(to right, #3498db, #9b59b6);"></div>
          <div class="bar-label" style="font-size:9px;"><span id="xp-text">0 XP</span></div>
        </div>
      </div>

      <!-- Minimap -->
      <div id="minimap-container" style="position:absolute; top:max(10px, env(safe-area-inset-top)); right:max(10px, env(safe-area-inset-right)); z-index:5; pointer-events:auto;"></div>

      <div id="zone-name"></div>
      <!-- Virtual Joystick Zone (touch only) -->
      <div id="joystick-zone"></div>

      <!-- Action Buttons (touch only) -->
      <div id="action-buttons">
        <button id="btn-attack" class="action-btn">ATK</button>
        <button id="btn-party" class="action-btn">INV</button>
        <button id="btn-leave-party" class="action-btn">Leave</button>
      </div>

      <!-- Party HUD -->
      <div id="party-hud"></div>

      <!-- Party Invite Modal -->
      <div id="party-invite-modal">
        <p id="invite-text"></p>
        <div class="invite-buttons">
          <button id="invite-accept">Accept</button>
          <button id="invite-decline">Decline</button>
        </div>
      </div>

      <!-- Dungeon Complete Banner -->
      <div id="dungeon-complete-banner">
        <h2>Dungeon Complete!</h2>
        <p>An exit portal has appeared.</p>
      </div>

      <!-- Dungeon Wipe Overlay -->
      <div id="dungeon-wipe-overlay">
        <h2>Party Wiped</h2>
        <p>Returning to the overworld...</p>
      </div>

      <div id="death-overlay">
        <h2>You Died</h2>
        <p>Respawning...</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
