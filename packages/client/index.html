<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MadWorld</title>
  <link rel="stylesheet" href="/src/ui/styles/mobile.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #game { width: 100%; height: 100%; position: relative; }
    #game canvas { display: block; }
    #ui-root {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
    }
    #ui-root > * { pointer-events: auto; }

    /* Loading screen */
    #loading-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      z-index: 200;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-bar-container {
      width: 300px; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 0%;
      background: #e94560;
      transition: width 0.3s;
      border-radius: 3px;
    }
    .loading-status {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 12px;
    }

    /* Login screen */
    #login-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      z-index: 100;
    }
    #login-screen h1 {
      font-size: 48px;
      color: #e94560;
      margin-bottom: 10px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.7), 0 4px 8px rgba(0,0,0,0.5);
    }
    #login-screen .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }
    #login-screen form {
      display: flex; flex-direction: column; gap: 12px; width: 300px;
    }
    #login-screen input {
      padding: 10px 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }
    #login-screen input::placeholder { color: rgba(255,255,255,0.4); }
    #login-screen button {
      padding: 12px;
      background: #e94560;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen button:hover { background: #c73e54; }
    #login-screen .toggle { color: #aaa; text-align: center; cursor: pointer; font-size: 13px; }
    #login-screen .toggle:hover { color: #fff; }
    #login-screen .error { color: #ff6b6b; text-align: center; font-size: 13px; min-height: 18px; }

    /* HUD */
    #hud {
      position: absolute; top: 10px; left: 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .bar-container {
      width: 220px; height: 24px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .bar-container.damage-flash {
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 8px rgba(255,0,0,0.6);
      transition: box-shadow 0.3s;
    }
    .bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }
    .bar-fill.hp { background: linear-gradient(to right, #e94560, #ff6b6b); }
    .bar-label {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    /* Party HUD */
    #party-hud {
      position: absolute; top: 50px; left: 10px;
      display: none; flex-direction: column; gap: 6px;
      width: 180px;
    }
    .party-member {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 4px 8px;
    }
    .party-member-header { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .party-member-name { font-size: 11px; font-weight: bold; }
    .party-leader-icon { color: #ffd700; font-size: 11px; }
    .party-hp-container {
      width: 100%; height: 14px;
      background: rgba(0,0,0,0.5);
      border-radius: 2px;
      overflow: hidden; position: relative;
    }
    .party-hp-bar { height: 100%; transition: width 0.3s; }
    .party-hp-text {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
    }
    .party-member-zone { font-size: 9px; color: #888; }

    /* Party invite modal */
    #party-invite-modal {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      display: none; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.85); border: 1px solid #e94560;
      border-radius: 8px; padding: 16px 24px; z-index: 60;
    }
    #party-invite-modal p { font-size: 14px; text-align: center; }
    #party-invite-modal .invite-buttons { display: flex; gap: 10px; }
    #party-invite-modal button {
      padding: 8px 16px; border: none; border-radius: 4px;
      font-family: inherit; font-size: 13px; cursor: pointer;
    }
    #invite-accept { background: #2ecc71; color: #fff; }
    #invite-decline { background: #e74c3c; color: #fff; }

    /* Dungeon complete banner */
    #dungeon-complete-banner {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
      display: none; flex-direction: column; align-items: center;
      background: rgba(0,0,0,0.8); border: 2px solid #ffd700;
      border-radius: 10px; padding: 20px 40px; z-index: 55;
    }
    #dungeon-complete-banner h2 { color: #ffd700; font-size: 28px; }
    #dungeon-complete-banner p { color: #ccc; font-size: 14px; margin-top: 8px; }

    /* Dungeon wipe overlay */
    #dungeon-wipe-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(80,0,0,0.7); display: none;
      align-items: center; justify-content: center; flex-direction: column; z-index: 50;
    }
    #dungeon-wipe-overlay.active { display: flex; }
    #dungeon-wipe-overlay h2 { color: #ff4444; font-size: 36px; }
    #dungeon-wipe-overlay p { color: #ccc; font-size: 16px; margin-top: 8px; }

    /* Zone name */
    #zone-name {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      font-size: 22px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.5);
      padding: 6px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #zone-name.visible { opacity: 1; }

    /* System messages */
    #system-messages {
      position: absolute;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      z-index: 20; pointer-events: none;
    }
    .system-msg {
      background: rgba(0,0,0,0.7);
      padding: 8px 18px;
      border-radius: 16px;
      font-size: 13px;
      color: #ddd;
      border: 1px solid rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .system-msg.visible { opacity: 1; }

    /* Login particles */
    .login-particle {
      position: absolute;
      width: 3px; height: 3px;
      background: rgba(233, 69, 96, 0.25);
      border-radius: 50%;
      animation: loginFloat 10s infinite ease-in-out;
      pointer-events: none;
    }
    @keyframes loginFloat {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-120vh) scale(0.5); opacity: 0; }
    }

    /* Damage flash animation */
    @keyframes damageFlash {
      0% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
      50% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 12px rgba(255,50,50,0.6); }
      100% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
    }
    .bar-container.damage-flash { animation: damageFlash 0.3s ease; }

    /* Skill XP popup */
    .xp-popup {
      position: absolute;
      right: 10px;
      font-size: 14px;
      color: #7bed9f;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      animation: xpFade 2s ease-out forwards;
    }
    @keyframes xpFade {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-30px); }
    }

    /* Chat panel */
    #chat-panel {
      position: absolute;
      bottom: 10px; left: 10px;
      width: 360px;
      max-height: 250px;
      display: flex; flex-direction: column;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      z-index: 30;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #chat-panel.open { opacity: 1; }
    #chat-panel:hover { opacity: 1; }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
      max-height: 180px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
      font-size: 12px;
      line-height: 1.5;
    }
    .chat-msg { word-wrap: break-word; }
    .chat-tabs {
      display: flex;
      gap: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .chat-tab {
      flex: 1;
      padding: 3px 0;
      text-align: center;
      font-size: 10px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      background: transparent;
      border: none;
      font-family: inherit;
      transition: color 0.15s, background 0.15s;
    }
    .chat-tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .chat-tab.active { color: #fff; background: rgba(255,255,255,0.1); }
    #chat-input {
      width: 100%;
      padding: 6px 8px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.3); }
    @media (max-width: 600px) {
      #chat-panel {
        width: calc(100% - 20px);
        max-height: 40vh;
      }
    }

    /* Death overlay */
    #death-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(80,0,0,0.85) 100%);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      z-index: 50;
    }
    #death-overlay.active { display: flex; }
    #death-overlay h2 { color: #e94560; font-size: 36px; margin-bottom: 10px; }
    #death-overlay p { color: #aaa; font-size: 16px; }

    /* Inventory Panel */
    #inventory-panel {
      position: absolute;
      top: 50%; right: 20px;
      transform: translateY(-50%);
      width: 340px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 12px;
      z-index: 40;
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: auto;
    }
    #inventory-panel.open {
      display: block;
      opacity: 1;
    }
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(7, 40px);
      grid-template-rows: repeat(4, 40px);
      gap: 4px;
      justify-content: center;
    }
    .inv-slot {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .inv-slot:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }
    .inv-item {
      width: 32px;
      height: 32px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      user-select: none;
    }
    .inv-quantity {
      position: absolute;
      bottom: 1px;
      right: 2px;
      font-size: 9px;
      color: #fff;
      background: rgba(0,0,0,0.7);
      border-radius: 3px;
      padding: 0 3px;
      line-height: 14px;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    /* Inventory context menu */
    #inv-context-menu {
      position: fixed;
      display: none;
      background: rgba(20,20,30,0.95);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      min-width: 100px;
      z-index: 100;
      overflow: hidden;
    }
    .ctx-option {
      padding: 6px 14px;
      font-size: 12px;
      color: #ddd;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ctx-option:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .ctx-option.ctx-drop {
      color: #e94560;
    }
    .ctx-option.ctx-drop:hover {
      background: rgba(233,69,96,0.2);
    }

    /* Equipment Panel */
    #equip-panel {
      margin-bottom: 10px;
    }
    .equip-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .equip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .equip-slot {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      cursor: default;
      transition: background 0.15s;
    }
    .equip-slot.filled {
      cursor: pointer;
    }
    .equip-slot.filled:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .equip-label {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      min-width: 42px;
      text-transform: uppercase;
    }
    .equip-item-name {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .equip-item-name.empty-text {
      color: rgba(255,255,255,0.2);
      font-weight: 400;
    }
    .equip-stats {
      margin-top: 8px;
      font-size: 10px;
      color: #7bed9f;
      text-align: center;
      padding: 4px;
      background: rgba(255,255,255,0.03);
      border-radius: 3px;
    }

    /* Item Tooltip */
    #item-tooltip {
      position: fixed;
      display: none;
      background: rgba(10,10,20,0.95);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 10px 14px;
      z-index: 110;
      max-width: 220px;
      pointer-events: none;
    }
    .tooltip-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .tooltip-rarity {
      font-size: 10px;
      text-transform: capitalize;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .tooltip-desc {
      font-size: 11px;
      color: #bbb;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .tooltip-stats {
      font-size: 11px;
      color: #7bed9f;
      margin-bottom: 4px;
    }
    .tooltip-heal {
      font-size: 11px;
      color: #ff6b6b;
      margin-bottom: 4px;
    }
    .tooltip-req {
      font-size: 10px;
      color: #ffdd57;
      margin-bottom: 4px;
    }
    .tooltip-slot {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }

    /* Quest Log */
    #quest-log {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      width: 280px;
      max-height: 60vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 0;
      z-index: 35;
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    #quest-log.open {
      display: block;
      opacity: 1;
    }
    .quest-log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
      font-weight: 700;
      color: #ffd700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .quest-log-close {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: #aaa;
      font-size: 12px;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .quest-log-close:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .quest-log-empty {
      padding: 20px 12px;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
    .quest-entry {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .quest-entry:last-child {
      border-bottom: none;
    }
    .quest-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 3px;
    }
    .quest-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .quest-progress-bar {
      height: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .quest-progress-fill {
      height: 100%;
      background: linear-gradient(to right, #2ecc71, #27ae60);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .quest-progress-text {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #fff;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
    }
    .quest-completed {
      opacity: 0.5;
    }
    .quest-done-tag {
      font-size: 9px;
      color: #2ecc71;
      font-weight: 400;
      margin-left: 4px;
    }

    /* NPC Dialog */
    #npc-dialog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      max-height: 70vh;
      overflow-y: auto;
      background: rgba(10,10,20,0.95);
      border: 2px solid rgba(255,215,0,0.4);
      border-radius: 10px;
      padding: 0;
      z-index: 65;
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    #npc-dialog.open {
      display: block;
      opacity: 1;
    }
    .npc-dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .npc-dialog-name {
      font-size: 18px;
      font-weight: 700;
      color: #ffd700;
    }
    .npc-dialog-close {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: #aaa;
      font-size: 12px;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .npc-dialog-close:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .npc-dialog-text {
      padding: 14px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .npc-quest-section {
      padding: 10px 16px;
    }
    .npc-quest-section-title {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .npc-quest-offer {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .npc-quest-offer-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .npc-quest-offer-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .npc-quest-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .npc-quest-accept {
      background: #2ecc71;
      color: #fff;
    }
    .npc-quest-accept:hover {
      background: #27ae60;
    }
    .npc-quest-turnin {
      background: #ffd700;
      color: #1a1a2e;
    }
    .npc-quest-turnin:hover {
      background: #ffcc00;
    }
    .npc-no-quests {
      padding: 14px 16px;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }

    /* Skill Bar */
    #skill-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: none; /* shown when HUD visible */
      gap: 4px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 4px;
      z-index: 10;
    }
    .skill-slot {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .skill-slot.active {
      border-color: rgba(233,69,96,0.5);
      color: #fff;
    }
    .skill-slot .keybind {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 9px;
      color: rgba(255,255,255,0.4);
    }
    .skill-slot.locked {
      opacity: 0.3;
    }

    /* Settings Panel */
    #settings-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 20px;
      z-index: 70;
      display: none;
    }
    #settings-panel.open { display: block; }
    .settings-section { margin-bottom: 16px; }
    .settings-title {
      font-size: 14px;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .settings-label {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
    .settings-slider {
      -webkit-appearance: none;
      width: 150px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    .settings-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
    }
    .keybind-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
    }
    .keybind-table td {
      padding: 4px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .keybind-table td:first-child {
      color: rgba(255,255,255,0.5);
      width: 120px;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="ui-root">
      <!-- Loading Screen -->
      <div id="loading-screen">
        <h1 style="font-size:48px; color:#e94560; font-weight:900; letter-spacing:4px; text-transform:uppercase; text-shadow:0 0 20px rgba(233,69,96,0.7); margin-bottom:30px;">MadWorld</h1>
        <div class="loading-bar-container">
          <div class="loading-bar-fill" id="loading-bar"></div>
        </div>
        <div class="loading-status" id="loading-status">Loading...</div>
      </div>

      <!-- Login Screen -->
      <div id="login-screen">
        <div id="login-particles"></div>
        <h1>MadWorld</h1>
        <div class="subtitle">Browser MMORPG</div>
        <form id="login-form">
          <input type="email" id="auth-email" placeholder="Email" required />
          <input type="password" id="auth-password" placeholder="Password" required />
          <input type="text" id="auth-name" placeholder="Character Name" style="display:none" />
          <button type="submit" id="auth-submit">Login</button>
          <div class="error" id="auth-error"></div>
          <div class="toggle" id="auth-toggle">Don't have an account? Register</div>
          <div style="text-align:center; margin-top:8px;">
            <span id="guest-btn" style="color:rgba(255,255,255,0.4); font-size:13px; cursor:pointer; text-decoration:underline; transition:color 0.2s;">Play as Guest</span>
          </div>
        </form>
      </div>

      <!-- HUD -->
      <div id="hud" style="display:none">
        <div class="bar-container" style="height:28px;">
          <div class="bar-fill hp" id="hp-trail" style="width:100%; transition:width 0.8s ease; opacity:0.4; position:absolute; height:100%; border-radius:12px; background:linear-gradient(to right, #e94560, #ff6b6b);"></div>
          <div class="bar-fill hp" id="hp-bar" style="width:100%"></div>
          <div class="bar-label"><span style="font-size:8px; margin-right:4px; opacity:0.6;">HP</span><span id="hp-text">100 / 100</span></div>
        </div>
        <div class="bar-container" style="height:20px; margin-top:4px;">
          <div class="bar-fill xp" id="xp-bar" style="width:0%; background: linear-gradient(to right, #3498db, #9b59b6);"></div>
          <div class="bar-label" style="font-size:9px;"><span style="font-size:8px; margin-right:4px; opacity:0.6;">XP</span><span id="xp-text">0 XP</span></div>
        </div>
      </div>

      <!-- Minimap -->
      <div id="minimap-container" style="position:absolute; top:max(10px, env(safe-area-inset-top)); right:max(10px, env(safe-area-inset-right)); z-index:5; pointer-events:auto;"></div>

      <!-- System Messages -->
      <div id="system-messages"></div>

      <div id="zone-name"></div>
      <!-- Virtual Joystick Zone (touch only) -->
      <div id="joystick-zone"></div>

      <!-- Action Buttons (touch only) -->
      <div id="action-buttons">
        <button id="btn-attack" class="action-btn">Attack</button>
        <button id="btn-party" class="action-btn">Invite</button>
        <button id="btn-leave-party" class="action-btn">Leave Party</button>
      </div>

      <!-- Chat Panel -->
      <div id="chat-panel">
        <div id="chat-log"></div>
        <div class="chat-tabs">
          <button class="chat-tab active" data-channel="zone">Zone</button>
          <button class="chat-tab" data-channel="global">Global</button>
        </div>
        <input id="chat-input" type="text" placeholder="Press Enter to chat..." maxlength="200" autocomplete="off" />
      </div>

      <!-- Party HUD -->
      <div id="party-hud"></div>

      <!-- Party Invite Modal -->
      <div id="party-invite-modal">
        <p id="invite-text"></p>
        <div class="invite-buttons">
          <button id="invite-accept">Accept</button>
          <button id="invite-decline">Decline</button>
        </div>
      </div>

      <!-- Dungeon Complete Banner -->
      <div id="dungeon-complete-banner">
        <h2>Dungeon Complete!</h2>
        <p>An exit portal has appeared.</p>
      </div>

      <!-- Dungeon Wipe Overlay -->
      <div id="dungeon-wipe-overlay">
        <h2>Party Wiped</h2>
        <p>Returning to the overworld...</p>
      </div>

      <div id="death-overlay">
        <h2>You Died</h2>
        <p>Respawning shortly...</p>
      </div>

      <!-- Inventory Panel -->
      <div id="inventory-panel">
        <div id="equip-panel"></div>
        <div class="inv-grid"></div>
      </div>

      <!-- Inventory Context Menu -->
      <div id="inv-context-menu"></div>

      <!-- Item Tooltip -->
      <div id="item-tooltip"></div>

      <!-- Skill Bar -->
      <div id="skill-bar"></div>

      <!-- Quest Log -->
      <div id="quest-log"></div>

      <!-- NPC Dialog -->
      <div id="npc-dialog"></div>

      <!-- Settings Panel -->
      <div id="settings-panel"></div>

      <!-- Version -->
      <div style="position:absolute; bottom:6px; right:10px; font-size:10px; color:rgba(255,255,255,0.15); pointer-events:none;">v0.1.0</div>
    </div>
  </div>
  <script>
    // Login screen floating particles
    const pc = document.getElementById('login-particles');
    if (pc) { for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'login-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = 60 + Math.random() * 40 + '%';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.animationDuration = 8 + Math.random() * 6 + 's';
      pc.appendChild(p);
    }}
  </script>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
