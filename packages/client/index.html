<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MadWorld</title>
  <link rel="stylesheet" href="/src/ui/styles/game-ui.css" />
  <link rel="stylesheet" href="/src/ui/styles/mobile.css" />
</head>
<body>
  <div id="game">
    <div id="ui-root">
      <!-- Loading Screen -->
      <div id="loading-screen">
        <h1 style="font-size:44px; color:var(--color-gold); font-weight:900; letter-spacing:6px; text-transform:uppercase; text-shadow:0 0 30px rgba(218,165,32,0.4),0 2px 8px rgba(0,0,0,0.6); margin-bottom:30px;">MadWorld</h1>
        <div class="loading-bar-container">
          <div class="loading-bar-fill" id="loading-bar"></div>
        </div>
        <div class="loading-status" id="loading-status">Loading...</div>
      </div>

      <!-- Login Screen -->
      <div id="login-screen">
        <div id="login-particles"></div>
        <h1>MadWorld</h1>
        <div class="subtitle">Explore Together</div>
        <form id="login-form">
          <input type="email" id="auth-email" placeholder="Email" required />
          <input type="password" id="auth-password" placeholder="Password" required />
          <input type="text" id="auth-name" placeholder="Character Name" style="display:none" />
          <button type="submit" id="auth-submit">Login</button>
          <div class="error" id="auth-error"></div>
          <div class="toggle" id="auth-toggle">Don't have an account? Register</div>
          <div style="text-align:center; margin-top:8px;">
            <span id="guest-btn" style="color:var(--ui-text-muted); font-size:13px; cursor:pointer; text-decoration:underline; transition:color 0.2s;">Play as Guest</span>
          </div>
        </form>
      </div>

      <!-- HUD -->
      <div id="hud" style="display:none">
        <div class="bar-container" style="height:26px;">
          <div class="bar-fill hp" id="hp-trail" style="width:100%; transition:width 0.8s ease; opacity:0.3; position:absolute; height:100%; border-radius:2px; background:linear-gradient(90deg,#8b1a1a,#c0392b);"></div>
          <div class="bar-fill hp" id="hp-bar" style="width:100%"></div>
          <div class="bar-label"><span style="font-size:8px; margin-right:4px; opacity:0.5;">HP</span><span id="hp-text">100 / 100</span></div>
        </div>
        <div class="bar-container" style="height:18px; margin-top:3px;">
          <div class="bar-fill" id="xp-bar" style="width:0%; background:linear-gradient(90deg,var(--color-xp),var(--color-xp-light));"></div>
          <div class="bar-label" style="font-size:9px;"><span style="font-size:8px; margin-right:4px; opacity:0.5;">XP</span><span id="xp-text">0 XP</span></div>
        </div>
      </div>

      <!-- Minimap -->
      <div id="minimap-container"></div>

      <!-- System Messages -->
      <div id="system-messages"></div>

      <div id="zone-name"></div>

      <!-- Virtual Joystick Zone (touch only) -->
      <div id="joystick-zone"></div>

      <!-- HUD Toggle Buttons -->
      <div id="hud-buttons">
        <button id="btn-inventory" class="hud-btn" title="Inventory (I)">I</button>
        <button id="btn-skills" class="hud-btn" title="Skills (K)">K</button>
        <button id="btn-quests" class="hud-btn" title="Quests (L)">L</button>
        <button id="btn-settings" class="hud-btn" title="Settings (Esc)">S</button>
      </div>

      <!-- Action Buttons (touch only) -->
      <div id="action-buttons">
        <button id="btn-attack" class="action-btn">Attack</button>
        <button id="btn-party" class="action-btn">Invite</button>
        <button id="btn-leave-party" class="action-btn">Leave Party</button>
      </div>

      <!-- Chat Panel -->
      <div id="chat-panel">
        <div id="chat-log"></div>
        <div class="chat-tabs">
          <button class="chat-tab active" data-channel="zone">Zone</button>
          <button class="chat-tab" data-channel="global">Global</button>
        </div>
        <input id="chat-input" type="text" placeholder="Press Enter to chat..." maxlength="200" autocomplete="off" />
      </div>

      <!-- Party HUD -->
      <div id="party-hud"></div>

      <!-- Party Invite Modal -->
      <div id="party-invite-modal">
        <p id="invite-text"></p>
        <div class="invite-buttons">
          <button id="invite-accept">Accept</button>
          <button id="invite-decline">Decline</button>
        </div>
      </div>

      <!-- Dungeon Complete Banner -->
      <div id="dungeon-complete-banner">
        <h2>Dungeon Complete!</h2>
        <p>An exit portal has appeared.</p>
      </div>

      <!-- Dungeon Wipe Overlay -->
      <div id="dungeon-wipe-overlay">
        <h2>Party Wiped</h2>
        <p>Returning to the overworld...</p>
      </div>

      <div id="death-overlay">
        <h2>You Died</h2>
        <p>Respawning shortly...</p>
      </div>

      <!-- Inventory Panel -->
      <div id="inventory-panel" class="game-panel">
        <div class="panel-header">
          <span class="panel-title">Inventory</span>
        </div>
        <div class="panel-body">
          <div id="equip-panel"></div>
          <div class="inv-grid"></div>
        </div>
      </div>

      <!-- Inventory Context Menu -->
      <div id="inv-context-menu"></div>

      <!-- Skills Panel -->
      <div id="skills-panel" class="game-panel">
        <div class="panel-header">
          <span class="panel-title">Skills</span>
        </div>
        <div id="skills-list"></div>
      </div>

      <!-- Item Tooltip -->
      <div id="item-tooltip"></div>

      <!-- Skill Bar -->
      <div id="skill-bar"></div>

      <!-- Quest Log -->
      <div id="quest-log" class="game-panel">
        <div class="panel-header">
          <span class="panel-title">Quests</span>
          <button class="panel-close quest-log-close">&times;</button>
        </div>
        <div id="quest-list"></div>
      </div>

      <!-- NPC Dialog -->
      <div id="npc-dialog" class="game-panel"></div>

      <!-- Settings Panel -->
      <div id="settings-panel" class="game-panel"></div>

      <!-- Version -->
      <div style="position:absolute; bottom:6px; right:10px; font-size:10px; color:var(--ui-text-muted); pointer-events:none;">v0.2.0</div>
    </div>
  </div>
  <script>
    // Login screen floating particles
    const pc = document.getElementById('login-particles');
    if (pc) { for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'login-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = 60 + Math.random() * 40 + '%';
      p.style.animationDelay = Math.random() * 12 + 's';
      p.style.animationDuration = 10 + Math.random() * 8 + 's';
      pc.appendChild(p);
    }}
  </script>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
